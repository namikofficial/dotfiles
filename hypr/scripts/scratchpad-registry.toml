# Scratchpad Registry v2
# One source of truth for scratchpad names, commands, matchers, and geometry.

[layout]
margin = 10

[scene.main]
name = "Main Workspace"
geometry = { x = 0, y = 0, w = 64, h = 72, min_w = 760, min_h = 420 }
restore = true

[scratchpads.terminal]
name = "Shell"
description = "Drop-down tmux shell"
icon = "terminal"
class = "noxflow-scratch-terminal"
mode = "overlay"
workspace = "scratch_spatial"
launch = "terminal"
dashboard = { x = 3, y = 3, w = 1, h = 1, accent = "card-terminal" }
overlay_geometry = { x = 0, y = 0, w = 50, h = 40, min_w = 760, min_h = 300 }

[scratchpads.ai]
name = "AI"
description = "OpenCode workspace with local models"
icon = "ai"
class = "noxflow-scratch-ai"
mode = "overlay"
workspace = "scratch_spatial"
launch = "ai"
dashboard = { x = 2, y = 0, w = 1, h = 2, accent = "card-ai" }
scene_geometry = { x = 50, y = 0, w = 50, h = 85, min_w = 420, min_h = 420 }
overlay_geometry = { x = 50, y = 0, w = 50, h = 85, min_w = 420, min_h = 420 }

[scratchpads.logs]
name = "Project Runner"
description = "Run project commands in the focused repo"
icon = "terminal"
class = "noxflow-scratch-logs"
mode = "overlay"
workspace = "scratch_spatial"
launch = "terminal-cmd"
dashboard = { x = 0, y = 2, w = 3, h = 1, accent = "card-logs" }
scene_geometry = { x = 0, y = 70, w = 100, h = 30, min_w = 980, min_h = 220 }
overlay_geometry = { x = 0, y = 70, w = 100, h = 30, min_w = 980, min_h = 220 }

[scratchpads.notes]
name = "Notes"
description = "Left-side quick notes"
icon = "notes"
class = "noxflow-scratch-notes"
mode = "overlay"
workspace = "scratch_spatial"
launch = "notes"
dashboard = { x = 3, y = 1, w = 1, h = 1, accent = "card-notes" }
overlay_geometry = { x = 0, y = 36, w = 32, h = 36, min_w = 420, min_h = 300 }

[scratchpads.obsidian]
name = "Obsidian"
description = "Focus your notes vault"
icon = "obsidian"
class = "obsidian"
mode = "focus"
workspace = "current"
launch = "obsidian"
dashboard = { x = 3, y = 0, w = 1, h = 1, accent = "card-obsidian" }

[scratchpads.db]
name = "Database"
description = "Persistent DB shell"
icon = "database"
class = "noxflow-scratch-db"
mode = "overlay"
workspace = "scratch_spatial"
launch = "db"
dashboard = { x = 3, y = 2, w = 1, h = 1, accent = "card-db" }
overlay_geometry = { x = 32, y = 36, w = 32, h = 36, min_w = 420, min_h = 300 }

[scratchpads.music]
name = "Music"
description = "Transient music pad"
icon = "music"
class = "noxflow-scratch-music"
mode = "overlay"
workspace = "scratch_spatial"
launch = "music"
dashboard = { x = 3, y = 4, w = 1, h = 1, accent = "card-music" }
overlay_geometry = { x = 0, y = 0, w = 30, h = 72, min_w = 380, min_h = 420 }

[scratchpads.browser-devtools]
name = "Browser DevTools"
description = "Inspect the current browser session"
icon = "browser"
class = "noxflow-scratch-browser"
mode = "overlay"
workspace = "scratch_spatial"
launch = "browser-devtools"
dashboard = { x = 0, y = 3, w = 3, h = 2, accent = "card-browser" }
overlay_geometry = { x = 0, y = 40, w = 50, h = 60, min_w = 760, min_h = 520 }
