category: Keyboard
slug: keyboard
entries:
  - key: Super+Return
    description: Open terminal
    copy: kitty
    source: ~/.config/hypr/hyprland.conf
    tags: [daily]
  - key: Super+Space
    description: App launcher (fast)
    copy: ~/.config/hypr/scripts/launcher.sh --fast
    source: ~/.config/hypr/hyprland.conf
    tags: [daily]
  - key: Super+Shift+Space
    description: Workspace overview search
    copy: ~/.config/hypr/scripts/workspace-overview.sh
    source: ~/.config/hypr/hyprland.conf
    tags: [daily]
  - key: Super+Ctrl+Space
    description: Quick actions palette
    copy: ~/.config/hypr/scripts/quick-actions.sh
    source: ~/.config/hypr/hyprland.conf
  - key: Super+Tab
    description: Mission control overview
    copy: hyprctl dispatch hyprexpo:expo toggle
    source: ~/.config/hypr/hyprland.conf
  - key: Super+Q
    description: Close active window
    copy: hyprctl dispatch killactive
    source: ~/.config/hypr/hyprland.conf
    tags: [daily]
  - key: Ctrl+Shift+T
    description: Kitty new tab in current cwd
    copy: new_tab_with_cwd
    source: ~/.config/kitty/kitty.conf
    tags: [daily]
  - key: Ctrl+Shift+O
    description: Kitty split horizontally
    copy: launch --location=hsplit --cwd=current
    source: ~/.config/kitty/kitty.conf
  - key: Ctrl+Shift+E
    description: Kitty split vertically
    copy: launch --location=vsplit --cwd=current
    source: ~/.config/kitty/kitty.conf
  - key: Ctrl+Shift+H/J/K/L
    description: Kitty focus split left/down/up/right
    copy: neighboring_window left|down|up|right
    source: ~/.config/kitty/kitty.conf
  - key: Ctrl+Shift+Alt+H/J/K/L
    description: Kitty resize split
    copy: resize_window narrower|shorter|taller|wider
    source: ~/.config/kitty/kitty.conf
  - key: Ctrl+Shift+F5
    description: Reload kitty config
    copy: load_config_file
    source: ~/.config/kitty/kitty.conf
