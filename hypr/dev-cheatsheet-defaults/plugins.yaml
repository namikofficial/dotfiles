category: Plugins
slug: plugins
entries:
  - key: Hyprland + hyprexpo
    description: mission-control style workspace overview
    copy: hyprctl plugin list
    source: ~/.config/hypr/hyprland.conf
  - key: Waybar modules
    description: status bar modules and custom scripts
    copy: ~/.config/hypr/waybar/config
    source: ~/.config/hypr/waybar/config
  - key: SwayNC
    description: notifications + quick toggles
    copy: ~/.config/hypr/swaync/config.json
    source: ~/.config/hypr/swaync/config.json
  - key: Neovim Lazy plugins
    description: open plugin manager
    copy: nvim +Lazy
    source: ~/.config/nvim/lazy-lock.json
  - key: Rofi themes
    description: launcher/palette theme files
    copy: ~/.config/rofi
    source: ~/.config/rofi
