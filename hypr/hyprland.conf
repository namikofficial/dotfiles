# Hyprland config - first-rice baseline

#############################
### ENVIRONMENT VARIABLES ###
#############################

# Session/env basics
env = XDG_SESSION_TYPE,wayland
env = AQ_DRM_DEVICES,/dev/dri/card1
env = AQ_NO_MODIFIERS,1

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

################
### MONITORS ###
################

# Auto-detect monitor layout. Kanshi handles per-dock profiles.
monitor = ,preferred,auto,1

###################
### MY PROGRAMS ###
###################

$terminal = kitty
$fileManager = dolphin
$menu = ~/.config/hypr/scripts/launcher.sh
$mainMod = SUPER

#################
### AUTOSTART ###
#################

exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = ~/.config/hypr/scripts/startup.sh

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 6
    gaps_out = 14
    border_size = 2
    col.active_border = rgba(7aa2f7ff) rgba(9ece6aff) 45deg
    col.inactive_border = rgba(444b6aff)
    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 10
    rounding_power = 2

    active_opacity = 1.0
    inactive_opacity = 0.95

    shadow {
        enabled = true
        range = 14
        render_power = 3
        color = rgba(00000066)
    }

    blur {
        enabled = true
        size = 5
        passes = 2
        vibrancy = 0.15
    }
}

animations {
    enabled = yes

    bezier = snappy,0.2,0.9,0.1,1.05
    bezier = smoothOut,0.35,0,0.6,-0.3
    bezier = smoothIn,0.25,1,0.5,1

    animation = windows,1,3,snappy,slide
    animation = windowsOut,1,2,smoothOut,slide
    animation = fade,1,2,smoothIn
    animation = border,1,10,default
    animation = workspaces,1,2.5,snappy,slide
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

#############
### INPUT ###
#############

input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = false
        tap-to-click = true
        drag_lock = true
    }
}

gesture = 3, horizontal, workspace

###################
### KEYBINDINGS ###
###################

# Launch / session
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, Space, exec, $menu
bind = $mainMod, Slash, exec, ~/.config/hypr/scripts/quick-actions.sh
bind = $mainMod, A, exec, ~/.config/hypr/scripts/quick-actions.sh
bind = $mainMod, B, exec, firefox
bind = $mainMod, Escape, exec, ~/.config/hypr/scripts/power-menu.sh
bind = $mainMod, L, exec, ~/.config/hypr/scripts/lock.sh
bind = $mainMod, W, exec, ~/.config/hypr/scripts/set-wallpaper.sh --pick
bind = $mainMod, N, exec, swaync-client -t
bind = $mainMod SHIFT, N, exec, swaync-client -d
bind = $mainMod SHIFT, Q, killactive
bind = $mainMod, F, fullscreen, 0
bind = $mainMod SHIFT, F, fullscreen, 1

# Tiling helpers
bind = $mainMod, V, togglefloating,
bind = $mainMod, P, pseudo,
bind = $mainMod, J, layoutmsg, togglesplit
bind = $mainMod, C, centerwindow,
bind = $mainMod ALT, F, workspaceopt, allfloat
bind = $mainMod ALT, P, workspaceopt, allpseudo

# Focus movement
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Move windows
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Scratchpad
bind = $mainMod, grave, togglespecialworkspace, magic
bind = $mainMod SHIFT, grave, movetoworkspace, special:magic

# Clipboard / screenshots
bind = $mainMod CTRL, V, exec, ~/.config/hypr/scripts/cliphist-rofi.sh
bind = $mainMod SHIFT, V, exec, ~/.config/hypr/scripts/cliphist-rofi.sh
bind = $mainMod SHIFT, S, exec, ~/.config/hypr/scripts/screenshot.sh area
bind = $mainMod CTRL SHIFT, S, exec, ~/.config/hypr/scripts/screenshot.sh full

# Mouse drag actions
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Media keys
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

bindl = ,XF86AudioNext, exec, playerctl next
bindl = ,XF86AudioPause, exec, playerctl play-pause
bindl = ,XF86AudioPlay, exec, playerctl play-pause
bindl = ,XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################

windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name = float-settings
    match:class = ^(pavucontrol|blueman-manager|nm-connection-editor|nm-applet|rofi|wlogout)$
    float = yes
}

windowrule {
    name = move-hyprland-run
    match:class = hyprland-run
    move = 20 monitor_h-120
    float = yes
}

windowrule {
    # Fix some drag issues with Xwayland popups.
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}
