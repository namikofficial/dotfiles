# Hyprland config - first-rice baseline

#############################
### ENVIRONMENT VARIABLES ###
#############################

# Session/env basics
env = XDG_SESSION_TYPE,wayland
env = AQ_NO_MODIFIERS,1
env = MOZ_ENABLE_WAYLAND,1
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_STYLE_OVERRIDE,kvantum
env = SDL_VIDEODRIVER,wayland
env = NIXOS_OZONE_WL,1
env = LIBVA_DRIVER_NAME,iHD
env = XCURSOR_THEME,Adwaita

# Hybrid-laptop safe default:
# Leave AQ_DRM_DEVICES unset for portability. If you need to pin manually,
# use /dev/dri/cardN (not by-path PCI names, because AQ_DRM_DEVICES is
# colon-separated).

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

################
### MONITORS ###
################

# Auto-detect monitor layout. Kanshi handles per-dock profiles.
monitor = ,preferred,auto,1

###################
### MY PROGRAMS ###
###################

$terminal = kitty
$fileManager = dolphin
$browser = google-chrome-stable
$menu = ~/.config/hypr/scripts/launcher.sh
$overview = ~/.config/hypr/scripts/workspace-overview.sh
$mainMod = SUPER

#################
### AUTOSTART ###
#################

exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = ~/.config/hypr/scripts/startup.sh

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 6
    gaps_out = 14
    border_size = 2
    col.active_border = rgba(7aa2f7ff) rgba(9ece6aff) 45deg
    col.inactive_border = rgba(444b6aff)
    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 12
    rounding_power = 2

    active_opacity = 1.0
    inactive_opacity = 0.95

    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(00000066)
    }

    blur {
        enabled = true
        size = 7
        passes = 3
        vibrancy = 0.22
    }
}

animations {
    enabled = yes

    bezier = snappy,0.2,0.9,0.1,1.05
    bezier = smoothOut,0.35,0,0.6,-0.3
    bezier = smoothIn,0.25,1,0.5,1

    animation = windows,1,4,snappy,slide
    animation = windowsOut,1,3,smoothOut,slide
    animation = fade,1,3,smoothIn
    animation = border,1,12,default
    animation = borderangle,1,9,default
    animation = workspaces,1,3,snappy,slide
    animation = specialWorkspace,1,3,snappy,slide
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

#############
### INPUT ###
#############

input {
    kb_layout = us
    follow_mouse = 0
    sensitivity = 0

    touchpad {
        natural_scroll = false
        tap-to-click = true
        drag_lock = true
    }
}

gesture = 3, horizontal, workspace

###################
### KEYBINDINGS ###
###################

# Launch / session
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, Space, exec, $menu
bind = $mainMod, Slash, exec, ~/.config/hypr/scripts/quick-actions.sh
bind = $mainMod, A, exec, ~/.config/hypr/scripts/quick-actions.sh
bind = $mainMod, Y, exec, ~/.config/hypr/scripts/eww-toggle.sh
bind = $mainMod SHIFT, Y, exec, ~/.config/hypr/scripts/theme-pass.sh
bind = $mainMod CTRL, Y, exec, ~/.config/hypr/scripts/panel-switch.sh toggle
bind = $mainMod, D, exec, ~/.config/hypr/scripts/dock-toggle.sh
bind = $mainMod, B, exec, $browser --ozone-platform-hint=auto
bind = $mainMod, G, exec, ~/.config/hypr/scripts/layout-switcher.sh toggle
bind = $mainMod, Escape, exec, ~/.config/hypr/scripts/power-menu.sh
bind = $mainMod, L, exec, ~/.config/hypr/scripts/lock.sh
bind = $mainMod, W, exec, $overview
bind = $mainMod, tab, hyprexpo:expo, toggle
bind = $mainMod SHIFT, tab, exec, $overview
bind = $mainMod, O, exec, ~/.config/hypr/scripts/set-wallpaper.sh --pick
bind = $mainMod SHIFT, O, exec, ~/.config/hypr/scripts/set-wallpaper.sh --next
bind = $mainMod, N, exec, swaync-client -t
bind = $mainMod SHIFT, N, exec, swaync-client -d
bind = $mainMod SHIFT, Q, killactive
bind = $mainMod, F, togglefloating,
bind = $mainMod SHIFT, F, fullscreen, 1
bind = $mainMod CTRL, F, fullscreen, 0

# Tiling helpers
bind = $mainMod, V, togglefloating,
bind = $mainMod, P, pseudo,
bind = $mainMod, J, layoutmsg, togglesplit
bind = $mainMod, C, centerwindow,
bind = $mainMod SHIFT, G, exec, ~/.config/hypr/scripts/layout-switcher.sh allfloat
bind = $mainMod CTRL, G, exec, ~/.config/hypr/scripts/layout-switcher.sh master
bind = $mainMod CTRL SHIFT, G, exec, ~/.config/hypr/scripts/layout-switcher.sh dwindle
bind = $mainMod ALT, F, workspaceopt, allfloat
bind = $mainMod ALT, P, workspaceopt, allpseudo

# Focus movement
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Move windows
bind = $mainMod SHIFT, h, movewindow, l
bind = $mainMod SHIFT, l, movewindow, r
bind = $mainMod SHIFT, k, movewindow, u
bind = $mainMod SHIFT, j, movewindow, d
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Floating window move/resize controls
bind = $mainMod CTRL, h, moveactive, -80 0
bind = $mainMod CTRL, l, moveactive, 80 0
bind = $mainMod CTRL, k, moveactive, 0 -80
bind = $mainMod CTRL, j, moveactive, 0 80
bind = $mainMod CTRL, left, moveactive, -80 0
bind = $mainMod CTRL, right, moveactive, 80 0
bind = $mainMod CTRL, up, moveactive, 0 -80
bind = $mainMod CTRL, down, moveactive, 0 80
bind = $mainMod CTRL SHIFT, h, resizeactive, -80 0
bind = $mainMod CTRL SHIFT, l, resizeactive, 80 0
bind = $mainMod CTRL SHIFT, k, resizeactive, 0 -80
bind = $mainMod CTRL SHIFT, j, resizeactive, 0 80
bind = $mainMod CTRL SHIFT, left, resizeactive, -80 0
bind = $mainMod CTRL SHIFT, right, resizeactive, 80 0
bind = $mainMod CTRL SHIFT, up, resizeactive, 0 -80
bind = $mainMod CTRL SHIFT, down, resizeactive, 0 80

# Fast workspace navigation without number row
bind = $mainMod, bracketleft, workspace, e-1
bind = $mainMod, bracketright, workspace, e+1
bind = $mainMod SHIFT, bracketleft, movetoworkspace, e-1
bind = $mainMod SHIFT, bracketright, movetoworkspace, e+1

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Scratchpad
bind = $mainMod, grave, togglespecialworkspace, magic
bind = $mainMod SHIFT, grave, movetoworkspace, special:magic

# Window groups (tab-like stacking)
bind = $mainMod, T, togglegroup
bind = $mainMod SHIFT, T, moveoutofgroup
bind = $mainMod, period, changegroupactive, f
bind = $mainMod, comma, changegroupactive, b

# Clipboard / screenshots
bind = $mainMod CTRL, V, exec, ~/.config/hypr/scripts/cliphist-rofi.sh
bind = $mainMod SHIFT, V, exec, ~/.config/hypr/scripts/cliphist-rofi.sh
bind = $mainMod SHIFT, S, exec, ~/.config/hypr/scripts/screenshot.sh area
bind = $mainMod CTRL SHIFT, S, exec, ~/.config/hypr/scripts/screenshot.sh full
bind = $mainMod CTRL, R, exec, ~/.config/hypr/scripts/screen-record-toggle.sh
bind = $mainMod, I, exec, hyprpicker -a
bind = $mainMod SHIFT, I, exec, ~/.config/hypr/scripts/night-light-toggle.sh
bind = , XF86Launch2, exec, ~/.config/hypr/scripts/ai-helper.sh ask
bind = , XF86Launch3, exec, ~/.config/hypr/scripts/ai-helper.sh clip
bind = , XF86Launch4, exec, ~/.config/hypr/scripts/ai-helper.sh shell
bind = , XF86Launch5, exec, ~/.config/hypr/scripts/ai-helper.sh debug
bind = $mainMod ALT, 2, exec, ~/.config/hypr/scripts/ai-helper.sh ask
bind = $mainMod ALT, 3, exec, ~/.config/hypr/scripts/ai-helper.sh clip
bind = $mainMod ALT, 4, exec, ~/.config/hypr/scripts/ai-helper.sh shell
bind = $mainMod ALT, 5, exec, ~/.config/hypr/scripts/ai-helper.sh debug

# Mouse drag actions
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Media keys
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

bindl = ,XF86AudioNext, exec, playerctl next
bindl = ,XF86AudioPause, exec, playerctl play-pause
bindl = ,XF86AudioPlay, exec, playerctl play-pause
bindl = ,XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################

windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name = float-settings
    match:class = ^(pavucontrol|blueman-manager|nm-connection-editor|nm-applet|rofi|wlogout)$
    float = yes
}

windowrule {
    name = move-hyprland-run
    match:class = hyprland-run
    move = 20 monitor_h-120
    float = yes
}

windowrule {
    # Fix some drag issues with Xwayland popups.
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}
