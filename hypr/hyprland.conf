# Hyprland config - first-rice baseline

#############################
### ENVIRONMENT VARIABLES ###
#############################

# Session/env basics
env = XDG_SESSION_TYPE,wayland
env = MOZ_ENABLE_WAYLAND,1
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_STYLE_OVERRIDE,kvantum
env = SDL_VIDEODRIVER,wayland
env = NIXOS_OZONE_WL,1
env = LIBVA_DRIVER_NAME,iHD
env = XCURSOR_THEME,Bibata-Modern-Ice

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

################
### MONITORS ###
################

# Generic baseline:
# - keep the laptop panel sane on its own
# - place unknown externals to the right until monitor-control.sh reapplies the
#   saved per-session layout
monitor = eDP-1,preferred,0x0,1
monitor = ,preferred,auto-right,1

###################
### MY PROGRAMS ###
###################

$terminal = kitty
$fileManager = dolphin
$browser = google-chrome-stable
$menu = ~/.config/hypr/scripts/launcher.sh
$overview = ~/.config/hypr/scripts/workspace-overview.sh
$mainMod = SUPER

#################
### AUTOSTART ###
#################

exec-once = uwsm finalize
exec-once = ~/.config/hypr/scripts/startup.sh

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(6f94c9ff) rgba(66c2b8ff) 45deg
    col.inactive_border = rgba(3f465fcc)
    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 12
    rounding_power = 2

    active_opacity = 0.98
    inactive_opacity = 0.9
    dim_inactive = true
    dim_strength = 0.12

    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(00000066)
    }

    blur {
        enabled = true
        size = 8
        passes = 2
        vibrancy = 0.12
    }
}

animations {
    enabled = yes

    bezier = enter,0.18,0.96,0.14,1
    bezier = exit,0.36,0.04,0.22,1
    bezier = ui,0.2,0.9,0.12,1
    bezier = workspaceFlow,0.12,0.98,0.08,1

    animation = windows,1,5,enter,slide
    animation = windowsOut,1,4,exit,popin 88%
    animation = fade,1,4,ui
    animation = border,1,10,ui
    animation = borderangle,1,8,ui
    animation = workspaces,1,8,workspaceFlow,slidefade 12%
    animation = specialWorkspace,1,7,enter,slidefadevert 10%
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

cursor {
    no_hardware_cursors = true
}

#############
### INPUT ###
#############

input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    natural_scroll = false

    touchpad {
        natural_scroll = true
        tap-to-click = true
        drag_lock = true
        scroll_factor = 0.95
    }
}

# Workspace swipe behavior (Windows/Pop!_OS-like touchpad navigation).
gestures {
    workspace_swipe_distance = 150
    workspace_swipe_invert = true
    workspace_swipe_min_speed_to_force = 36
    workspace_swipe_cancel_ratio = 0.12
    workspace_swipe_create_new = false
    workspace_swipe_direction_lock = true
    workspace_swipe_direction_lock_threshold = 8
    workspace_swipe_forever = true
}

gesture = 4, horizontal, workspace

###################
### KEYBINDINGS ###
###################

# Launch / session
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, E, exec, $fileManager

# ── tmux / terminal tools ────────────────────────────────────────────────────
# grave = the ` key  (bottom-left of the number row)
bind = $mainMod,       grave, exec, ~/.config/hypr/scripts/tmux-scratch.sh toggle   # toggle tmux scratch terminal
bind = $mainMod SHIFT, grave, exec, ~/.config/hypr/scripts/tmux-projects.sh         # FZF project picker → tmux session
bind = $mainMod CTRL,  grave, exec, ~/.config/hypr/scripts/tmux-lazygit.sh          # lazygit (opens at focused window's git root)
bind = $mainMod ALT,   grave, exec, ~/.config/hypr/scripts/scratch-launchpad.sh     # launchpad: git/system/dev/files tool picker

bind = $mainMod, Space, exec, $menu
bind = $mainMod SHIFT, Space, exec, $overview
bind = $mainMod CTRL, Space, exec, ~/.config/hypr/scripts/quick-actions.sh
bind = $mainMod, F1, exec, ~/.config/hypr/scripts/hypr-binds.sh
bind = $mainMod, Slash, exec, ~/.config/hypr/scripts/quick-actions.sh
bind = $mainMod CTRL, Slash, exec, ~/.config/hypr/scripts/hypr-binds.sh
bind = $mainMod, A, exec, ~/.config/hypr/scripts/quick-actions.sh
bind = $mainMod, Y, exec, $overview
bind = $mainMod SHIFT, Y, exec, ~/.config/hypr/scripts/panel-switch.sh toggle-view
bind = $mainMod CTRL, Y, exec, ~/.config/hypr/scripts/eww-desktop-toggle.sh show
bind = $mainMod CTRL ALT, Y, exec, ~/.config/hypr/scripts/eww-desktop-toggle.sh toggle
bind = $mainMod CTRL SHIFT, Y, exec, ~/.config/hypr/scripts/theme-pass.sh
bind = $mainMod, D, exec, ~/.config/hypr/scripts/quick-actions.sh
bind = $mainMod, comma, exec, ~/.config/hypr/scripts/settings-hub.sh
bind = $mainMod SHIFT, comma, exec, ~/.config/hypr/scripts/minimize-window.sh restore
bind = $mainMod CTRL, comma, exec, ~/.config/hypr/scripts/settings-hub.sh quick
bind = $mainMod ALT, comma, exec, ~/.config/hypr/scripts/settings-eww.sh
bind = $mainMod CTRL ALT, comma, exec, ~/.config/hypr/scripts/app-routing-apply-focused.sh
bind = $mainMod, B, exec, $browser --ozone-platform-hint=auto
bind = $mainMod, G, exec, ~/.config/hypr/scripts/layout-switcher.sh toggle
bind = $mainMod ALT, G, exec, ~/.config/hypr/scripts/layout-switcher.sh cycle
bind = $mainMod, P, exec, ~/.config/hypr/scripts/monitor-control.sh menu
bind = $mainMod, Escape, exec, ~/.config/hypr/scripts/power-menu.sh
bind = $mainMod CTRL, L, exec, ~/.config/hypr/scripts/lock.sh
bind = $mainMod CTRL ALT, L, exec, ~/.config/hypr/scripts/screensaver-awake.sh
bind = $mainMod, backslash, exec, ~/.config/hypr/scripts/sidepanel.sh toggle
bind = $mainMod SHIFT, backslash, exec, ~/.config/hypr/scripts/sidepanel.sh send
bind = $mainMod CTRL, backslash, exec, ~/.config/hypr/scripts/sidepanel.sh stash
bind = $mainMod, W, exec, $overview
# Super+Tab should always work: use hyprexpo when available, otherwise fall
# back to the Rofi workspace hub.
bind = $mainMod, tab, exec, ~/.config/hypr/scripts/workspace-overview-toggle.sh
bind = $mainMod SHIFT, tab, exec, $overview
bind = $mainMod, O, exec, ~/.config/hypr/scripts/set-wallpaper.sh --pick
bind = $mainMod SHIFT, O, exec, ~/.config/hypr/scripts/set-wallpaper.sh --next
bind = $mainMod, N, exec, ~/.config/hypr/scripts/notif-center-toggle.sh
bind = $mainMod ALT, N, exec, ~/.config/hypr/scripts/notif-dnd-toggle.sh
bind = $mainMod CTRL, N, exec, ~/.config/hypr/scripts/notif-copy-last.sh
bind = $mainMod CTRL ALT, N, exec, ~/.config/hypr/scripts/notif-mode.sh toggle

# Active only while notification center is open (set by notif-center-toggle.sh).
submap = notifpanel
bind = , escape, exec, ~/.config/hypr/scripts/notif-center-close.sh
bind = $mainMod, N, exec, ~/.config/hypr/scripts/notif-center-close.sh
bind = $mainMod SHIFT, S, exec, ~/.config/hypr/scripts/screenshot.sh area
bind = $mainMod CTRL SHIFT, S, exec, ~/.config/hypr/scripts/screenshot.sh full
submap = reset
bind = $mainMod SHIFT, N, exec, ~/.config/hypr/scripts/open-notes.sh
bind = $mainMod ALT, E, exec, ~/.config/hypr/scripts/open-notes.sh
bind = $mainMod SHIFT, Q, killactive
bind = $mainMod SHIFT, M, exec, ~/.config/hypr/scripts/minimize-window.sh minimize
bind = $mainMod, F, exec, ~/.config/hypr/scripts/float-toggle-smart.sh
bind = $mainMod SHIFT, F, fullscreen, 1
bind = $mainMod CTRL, F, fullscreen, 0
bind = $mainMod, M, fullscreen, 1

# Tiling helpers
bind = $mainMod, V, exec, ~/.config/hypr/scripts/float-toggle-smart.sh
bind = $mainMod SHIFT, P, pseudo,
bind = $mainMod, J, layoutmsg, togglesplit
bind = $mainMod, C, centerwindow,
bind = $mainMod SHIFT, G, exec, ~/.config/hypr/scripts/layout-switcher.sh allfloat
bind = $mainMod CTRL, G, exec, ~/.config/hypr/scripts/layout-switcher.sh master
bind = $mainMod CTRL SHIFT, G, exec, ~/.config/hypr/scripts/layout-switcher.sh dwindle
bind = $mainMod ALT, F, workspaceopt, allfloat
bind = $mainMod CTRL ALT, P, workspaceopt, allpseudo

# Focus movement
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = ALT, tab, cyclenext
bind = ALT, tab, bringactivetotop
bind = ALT SHIFT, tab, cyclenext, prev
bind = ALT SHIFT, tab, bringactivetotop

# Move windows
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Floating window move/resize controls
bind = $mainMod CTRL, left, moveactive, -80 0
bind = $mainMod CTRL, right, moveactive, 80 0
bind = $mainMod CTRL, up, moveactive, 0 -80
bind = $mainMod CTRL, down, moveactive, 0 80
bind = $mainMod CTRL SHIFT, left, resizeactive, -80 0
bind = $mainMod CTRL SHIFT, right, resizeactive, 80 0
bind = $mainMod CTRL SHIFT, up, resizeactive, 0 -80
bind = $mainMod CTRL SHIFT, down, resizeactive, 0 80

# Fast workspace navigation without number row
bind = $mainMod, bracketleft, workspace, e-1
bind = $mainMod, bracketright, workspace, e+1
bind = $mainMod SHIFT, bracketleft, movetoworkspace, e-1
bind = $mainMod SHIFT, bracketright, movetoworkspace, e+1

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10
bind = $mainMod CTRL, 0, exec, ~/.config/hypr/scripts/telemetry-workspace.sh open
bind = $mainMod CTRL SHIFT, 0, exec, ~/.config/hypr/scripts/telemetry-workspace.sh reset
bind = $mainMod CTRL, 9, exec, ~/.config/hypr/scripts/logs-workspace.sh open
bind = $mainMod CTRL SHIFT, 9, exec, ~/.config/hypr/scripts/logs-workspace.sh stack

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Window groups (tab-like stacking)
bind = $mainMod, T, togglegroup
bind = $mainMod CTRL, T, moveoutofgroup
bind = $mainMod ALT, period, changegroupactive, f
bind = $mainMod ALT, semicolon, changegroupactive, b
bind = $mainMod, period, exec, ~/.config/hypr/scripts/dev-cheatsheet.sh

# Clipboard / screenshots
bind = $mainMod CTRL, V, exec, ~/.config/hypr/scripts/cliphist-rofi.sh
bind = $mainMod SHIFT, V, exec, ~/.config/hypr/scripts/cliphist-rofi.sh
bind = $mainMod SHIFT, S, exec, ~/.config/hypr/scripts/screenshot.sh area
bind = $mainMod CTRL SHIFT, S, exec, ~/.config/hypr/scripts/screenshot.sh full
bind = $mainMod SHIFT, T, exec, ~/.config/hypr/scripts/ocr-capture.sh
bind = $mainMod CTRL, R, exec, ~/.config/hypr/scripts/screen-record-toggle.sh
bind = $mainMod, I, exec, hyprpicker -a
bind = $mainMod SHIFT, I, exec, ~/.config/hypr/scripts/night-light-toggle.sh
bind = , XF86Launch2, exec, ~/.config/hypr/scripts/ai-helper.sh ask
bind = , XF86Launch3, exec, ~/.config/hypr/scripts/ai-helper.sh clip
bind = , XF86Launch4, exec, ~/.config/hypr/scripts/ai-helper.sh shell
bind = , XF86Launch5, exec, ~/.config/hypr/scripts/ai-helper.sh debug
bind = $mainMod ALT, 2, exec, ~/.config/hypr/scripts/ai-helper.sh ask
bind = $mainMod ALT, 3, exec, ~/.config/hypr/scripts/ai-helper.sh clip
bind = $mainMod ALT, 4, exec, ~/.config/hypr/scripts/ai-helper.sh shell
bind = $mainMod ALT, 5, exec, ~/.config/hypr/scripts/ai-helper.sh debug

# Mouse drag actions
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Media keys
bindel = ,XF86AudioRaiseVolume, exec, ~/.config/hypr/scripts/volume-control.sh up
bindel = ,XF86AudioLowerVolume, exec, ~/.config/hypr/scripts/volume-control.sh down
bindel = ,XF86AudioMute, exec, ~/.config/hypr/scripts/volume-control.sh mute
bindel = ,XF86AudioMicMute, exec, ~/.config/hypr/scripts/volume-control.sh mic-mute
bindel = ,XF86MonBrightnessUp, exec, ~/.config/hypr/scripts/brightness-control.sh up
bindel = ,XF86MonBrightnessDown, exec, ~/.config/hypr/scripts/brightness-control.sh down

bindl = ,XF86AudioNext, exec, playerctl next
bindl = ,XF86AudioPause, exec, playerctl play-pause
bindl = ,XF86AudioPlay, exec, playerctl play-pause
bindl = ,XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################

windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name = float-settings
    match:class = ^(pavucontrol|blueman-manager|nm-connection-editor|nm-applet|rofi|wlogout)$
    float = yes
}

windowrule {
    name = rofi-motion
    match:class = ^(rofi)$
    animation = popin 88%
}

windowrule {
    name = wlogout-motion
    match:class = ^(wlogout)$
    animation = popin 92%
}

windowrule {
    name = utility-motion
    match:class = ^(pavucontrol|blueman-manager|nm-connection-editor|nm-applet)$
    animation = popin 90%
}

windowrule {
    name = move-hyprland-run
    match:class = hyprland-run
    move = 20 monitor_h-120
    float = yes
}

windowrule {
    name = logs-workspace
    match:class = ^(noxflow-logs)$
    workspace = 9
}

windowrule {
    name = telemetry-workspace
    match:class = ^(noxflow-telemetry)$
    workspace = 10
}

windowrule {
    # Fix some drag issues with Xwayland popups.
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}

# App-specific glass tuning.
windowrule {
    name = vscode-glass
    match:class = ^(code|Code|code-url-handler)$
    opacity = 0.96 0.9
}

windowrule {
    name = prism-glass
    match:class = ^(org.prismlauncher.PrismLauncher|prismlauncher|PrismLauncher)$
    opacity = 0.98 0.93
}

windowrule {
    name = obsidian-glass
    match:class = ^(obsidian|Obsidian)$
    opacity = 0.96 0.9
}

# ── tmux float windows ───────────────────────────────────────────────────────

# Quake-style drop-down: 80% wide centered island, clears waybar (70px from top)
# Border colour is set dynamically via theme-hooks.d/60-hyprland-accent.sh
windowrule {
    name = tmux-scratch-quake
    match:class = ^(noxflow-tmux-scratch)$
    workspace = special:scratch_tmux silent
    float = yes
    size = 80% 45%
    move = 10% 70
    rounding = 18
    animation = popin
}
windowrule {
    name = tmux-projects-float
    match:class = ^(noxflow-tmux-projects)$
    float = yes
    size = 65% 62%
    center = yes
}

windowrule {
    name = lazygit-float
    match:class = ^(noxflow-lazygit)$
    float = yes
    size = 90% 90%
    center = yes
}

# Launchpad tool floats — large (lazygit, btop, yazi, git-log)
windowrule {
    name = tool-large-float
    match:class = ^(noxflow-tool-large)$
    float = yes
    size = 82% 82%
    center = yes
}

# Launchpad tool floats — small (qalc, python, json, hash, fastfetch)
windowrule {
    name = tool-small-float
    match:class = ^(noxflow-tool-small)$
    float = yes
    size = 48% 55%
    center = yes
}

source = ~/.cache/hypr/theme-colors-hyprland.conf
source = ~/.cache/hypr/settings.generated.conf

# Eww notification layer blur rules disabled due to Hyprland syntax/version mismatch.
