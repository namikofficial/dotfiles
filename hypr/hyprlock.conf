background {
    monitor =
    path = ~/.cache/lock-wallpaper
    blur_passes = 2
    contrast = 0.9
    brightness = 0.8
    vibrancy = 0.2
}

input-field {
    monitor =
    size = 300, 54
    outline_thickness = 2
    dots_size = 0.22
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgb(7aa2f7)
    inner_color = rgb(1a1b26)
    font_color = rgb(c0caf5)
    fade_on_empty = false
    placeholder_text = Enter password...
    hide_input = false
    position = 0, -80
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%A, %d %B %H:%M')"
    color = rgb(c0caf5)
    font_size = 28
    position = 0, 100
    halign = center
    valign = center
}

label {
    monitor =
    text = Locked
    color = rgb(7aa2f7)
    font_size = 14
    position = 0, 58
    halign = center
    valign = center
}
