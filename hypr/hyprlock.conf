$lock_bg = rgb(1a1b26)
$lock_fg = rgb(c0caf5)
$lock_accent = rgb(7aa2f7)
$lock_blur = 4
$lock_brightness = 0.72
$lock_vibrancy = 0.24
source = ~/.cache/hypr/theme-colors-hyprlock.conf
source = ~/.cache/hypr/lock-settings.generated.conf

background {
    monitor =
    path = ~/.cache/lock-wallpaper
    blur_passes = $lock_blur
    contrast = 0.9
    brightness = $lock_brightness
    vibrancy = $lock_vibrancy
}

input-field {
    monitor =
    size = 300, 54
    outline_thickness = 2
    dots_size = 0.22
    dots_spacing = 0.2
    dots_center = true
    outer_color = $lock_accent
    inner_color = $lock_bg
    font_color = $lock_fg
    fade_on_empty = false
    placeholder_text = Enter password...
    hide_input = false
    position = 0, -80
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%A, %d %B %H:%M')"
    color = $lock_fg
    font_size = 28
    position = 0, 100
    halign = center
    valign = center
}

label {
    monitor =
    text = Locked
    color = $lock_accent
    font_size = 14
    position = 0, 58
    halign = center
    valign = center
}
