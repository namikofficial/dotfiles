# Launch an interactive login zsh so dotfiles are always loaded in new terminals.
shell zsh --login

font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.5
scrollback_lines 20000

cursor_shape beam
cursor_beam_thickness 1.6
cursor_blink_interval 0.45

window_padding_width 10
window_border_width 1.5
background_opacity 0.94
enable_audio_bell no
confirm_os_window_close 0
remember_window_size  no
initial_window_width  120c
initial_window_height 34c

# Keep shell aliases and prompt consistent across launch methods.
shell_integration enabled
tab_bar_style powerline
tab_powerline_style slanted
tab_bar_edge top

# Tokyo Night inspired palette tuned for readability.
foreground #c0caf5
background #1a1b26
selection_foreground #1a1b26
selection_background #7aa2f7

color0  #15161e
color1  #f7768e
color2  #9ece6a
color3  #e0af68
color4  #7aa2f7
color5  #bb9af7
color6  #7dcfff
color7  #a9b1d6
color8  #414868
color9  #f7768e
color10 #9ece6a
color11 #e0af68
color12 #7aa2f7
color13 #bb9af7
color14 #7dcfff
color15 #c0caf5
