# Launch interactive zsh (faster than login shells while still loading zshrc).
shell zsh -i

font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        13.0
scrollback_lines 20000

cursor_shape beam
cursor_beam_thickness 1.6
cursor_blink_interval 0.45

window_padding_width 16
single_window_padding_width 18
window_margin_width 5
single_window_margin_width 8
window_border_width 1.5
background_opacity 0.92
inactive_text_alpha 0.9
enable_audio_bell no
confirm_os_window_close 0
remember_window_size  no
initial_window_width  120c
initial_window_height 34c

# Keep shell aliases and prompt consistent across launch methods.
shell_integration enabled
allow_remote_control socket-only
listen_on unix:${XDG_RUNTIME_DIR}/kitty-control
env NOXFLOW_KITTY_DASHBOARD 1
enabled_layouts splits:split_axis=horizontal,stack,tall,fat,grid,horizontal,vertical
startup_layout splits
tab_bar_style powerline
tab_powerline_style slanted
tab_bar_edge top
tab_bar_min_tabs 1
tab_separator "  "
active_tab_font_style bold
inactive_tab_font_style normal
active_border_color #6f94c9
inactive_border_color #262b3e
bell_border_color #f7768e
active_tab_background #24283b
active_tab_foreground #c0caf5
inactive_tab_background #1a1b26
inactive_tab_foreground #7d8ab0
tab_bar_background #15161e
tab_title_template "{title}"

# Clipboard and URL ergonomics.
copy_on_select yes
strip_trailing_spaces smart
clipboard_control write-clipboard write-primary read-clipboard-ask
detect_urls yes
underline_hyperlinks always
open_url_with default

# Terminal behavior tweaks.
mouse_hide_waiting_for_keyboard yes
visual_bell_duration 0.0

# Keymaps: tabs, splits, focus, and config reload.
map ctrl+shift+t new_tab_with_cwd
map ctrl+shift+q close_window
map ctrl+shift+w close_tab
map ctrl+shift+[ previous_tab
map ctrl+shift+] next_tab
map ctrl+shift+alt+[ move_tab_backward
map ctrl+shift+alt+] move_tab_forward
map ctrl+shift+enter launch --cwd=current
map ctrl+shift+o launch --location=hsplit --cwd=current
map ctrl+shift+e launch --location=vsplit --cwd=current
map ctrl+shift+s launch --location=split --cwd=current
map ctrl+shift+r layout_action rotate
map ctrl+shift+x toggle_layout stack
map ctrl+shift+h neighboring_window left
map ctrl+shift+j neighboring_window down
map ctrl+shift+k neighboring_window up
map ctrl+shift+l neighboring_window right
map ctrl+shift+alt+h resize_window narrower 4
map ctrl+shift+alt+l resize_window wider 4
map ctrl+shift+alt+j resize_window shorter 4
map ctrl+shift+alt+k resize_window taller 4
map ctrl+shift+u kitten hints --type=url
map ctrl+shift+p kitten hints --type=path
map ctrl+shift+g show_scrollback
map ctrl+shift+a launch --type=clipboard --stdin-source=@screen_scrollback
map ctrl+shift+f5 load_config_file
map ctrl+shift+d launch --type=tab --title "Dashboard" --cwd=current env NOXFLOW_KITTY_DASHBOARD=1 zsh -i
map ctrl+shift+1 launch --type=tab --title "Scratch" --cwd=current env NOXFLOW_KITTY_DASHBOARD=0 zsh -i
map ctrl+shift+2 launch --type=tab --title "Logs" --cwd=current env NOXFLOW_KITTY_DASHBOARD=0 zsh -ic 'kitty_app_logs'
map ctrl+shift+3 launch --type=tab --title "Repo" --cwd=current env NOXFLOW_KITTY_DASHBOARD=0 zsh -ic 'kitty_app_repo'
map ctrl+shift+4 launch --type=tab --title "AI" --cwd=current env NOXFLOW_KITTY_DASHBOARD=0 zsh -ic 'kitty_app_ai'
map ctrl+shift+y launch --type=tab --title "Clipboard" --cwd=current env NOXFLOW_KITTY_DASHBOARD=0 zsh -ic 'kitty_clipboard_picker'

# Tokyo Night inspired palette tuned for readability.
foreground #c0caf5
background #1a1b26
selection_foreground #1a1b26
selection_background #6f94c9

color0  #15161e
color1  #f7768e
color2  #9ece6a
color3  #e0af68
color4  #6f94c9
color5  #86a9d8
color6  #66c2b8
color7  #a9b1d6
color8  #414868
color9  #f7768e
color10 #9ece6a
color11 #e0af68
color12 #6f94c9
color13 #86a9d8
color14 #66c2b8
color15 #c0caf5

# Wallpaper-driven runtime overrides (generated by theme-sync.sh).
include ~/.cache/hypr/theme-colors-kitty.conf
