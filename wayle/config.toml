imports = []

[general]
font-sans = "Inter"
font-mono = "JetBrains Mono"
tearing-mode = false

[bar]
scale = 0.84
inset-edge = 0.07
inset-ends = 0.10
padding = 0.14
padding-ends = 0.18
module-gap = 0.42
location = "top"
bg = "transparent"
background-opacity = 0
border-location = "none"
border-width = 1
border-color = "border-accent"
rounding = "none"
shadow = "none"
button-variant = "basic"
button-icon-size = 0.94
button-icon-padding = 0.90
button-label-size = 0.95
button-label-weight = "medium"
button-label-padding = 0.85
button-gap = 0.78
button-rounding = "sm"
button-group-background = "bg-surface-elevated"
button-group-rounding = "md"
button-group-module-gap = 0.28
button-group-padding = 0.16
button-group-border-location = "all"
button-group-border-width = 1
button-group-border-color = "border-subtle"
button-bg-opacity = 0
dropdown-shadow = true
dropdown-opacity = 98
dropdown-autohide = true
dropdown-freeze-label = true

[[bar.layout]]
monitor = "*"
show = true
left = [
  { name = "sys", modules = ["custom-updates"] },
  { name = "workspaces", modules = ["hyprland-workspaces"] },
  { name = "layout", modules = ["custom-layout"] },
  { name = "now", modules = ["media"] },
]
center = [
  { name = "center-clock", modules = ["clock"] },
]
right = [
  { name = "controls", modules = ["custom-brightness", "volume"] },
  { name = "status", modules = ["custom-vpn", "custom-dnd", "battery", "bluetooth", "network"] },
  { name = "actions", modules = ["custom-logs", "custom-actions"] },
  { name = "alerts", modules = ["notifications"] },
]

[styling]
scale = 0.92
rounding = "sm"
theme-provider = "wayle"
theming-monitor = ""

[styling.palette]
bg = "#10131a"
surface = "#171b24"
elevated = "#202632"
fg = "#e6e8ee"
fg-muted = "#9aa3b2"
primary = "#6f94c9"
red = "#e46870"
yellow = "#e0b870"
green = "#68c898"
blue = "#78a0e0"

[modules.hyprland-workspaces]
monitor-specific = true
show-special = true
display-mode = "label"
label-use-name = false
numbering = "absolute"
active-indicator = "background"
active-color = "accent"
occupied-color = "fg-muted"
empty-color = "fg-subtle"
workspace-padding = 0.72
icon-size = 0.95
label-size = 0.95
container-bg-color = "transparent"

[modules.window-title]
format = "{{ title }}"
label-max-length = 30

[modules.media]
format = "{{ title }}"
label-max-length = 24
left-click = "playerctl play-pause"
right-click = "playerctl next"

[modules.clock]
format = "%a %d %b %H:%M"
left-click = "dropdown:calendar"
dropdown-show-seconds = false

[modules.network]
label-show = false
icon-bg-color = "auto"
button-bg-color = "transparent"

[modules.volume]
label-show = true
label-max-length = 5
scroll-up = "wayle audio output-volume +3"
scroll-down = "wayle audio output-volume -3"
icon-bg-color = "auto"
label-color = "fg-default"
button-bg-color = "transparent"

[modules.bluetooth]
label-show = true
label-max-length = 14
icon-bg-color = "auto"
label-color = "fg-default"
button-bg-color = "transparent"

[modules.notification]
left-click = "dropdown:notification"
right-click = "wayle notify dnd"
popup-position = "top-right"
popup-max-visible = 5
popup-duration = 5000
icon-bg-color = "auto"
label-color = "fg-default"
button-bg-color = "transparent"

[[modules.custom]]
id = "updates"
command = '''/home/namik/.config/hypr/scripts/status-updates.sh'''
mode = "poll"
interval-ms = 900000
format = "{{ text }}"
icon-name = "md-system_update_alt-symbolic"
label-show = true
label-max-length = 4
button-bg-color = "transparent"
icon-bg-color = "auto"
label-color = "fg-default"
left-click = "/home/namik/.config/hypr/scripts/system-update.sh"
right-click = "/home/namik/.config/hypr/scripts/system-update.sh"
on-action = '''/home/namik/.config/hypr/scripts/status-updates.sh'''

[[modules.custom]]
id = "layout"
command = '''hyprctl -j activeworkspace 2>/dev/null | jq -r '.tiledLayout // "dwindle"' | awk '{printf("{\"text\":\"%s\"}\n", $0)}' '''
mode = "poll"
interval-ms = 1200
format = "{{ text }}"
icon-name = "ld-layout-grid-symbolic"
label-show = true
label-max-length = 12
button-bg-color = "bg-surface-elevated"
icon-bg-color = "auto"
label-color = "fg-default"
left-click = "/home/namik/.config/hypr/scripts/layout-switcher.sh cycle"
right-click = "/home/namik/.config/hypr/scripts/layout-switcher.sh toggle"
on-action = '''hyprctl -j activeworkspace 2>/dev/null | jq -r '.tiledLayout // "dwindle"' | awk '{printf("{\"text\":\"%s\"}\n", $0)}' '''

[[modules.custom]]
id = "brightness"
command = '''brightnessctl -m | awk -F',' '{gsub(/%/, "", $4); p=$4+0; printf("{\"percentage\":%d,\"text\":\"%d%%\"}\n", p, p)}' '''
mode = "poll"
interval-ms = 1500
format = "{{ text }}"
icon-names = [
  "md-brightness_1-symbolic",
  "md-brightness_4-symbolic",
  "md-brightness_7-symbolic",
]
label-show = true
label-max-length = 4
button-bg-color = "transparent"
icon-bg-color = "auto"
label-color = "fg-default"
left-click = "/home/namik/.config/hypr/scripts/brightness-control.sh menu"
right-click = "brightnessctl set 55%"
scroll-up = "brightnessctl set +4%"
scroll-down = "brightnessctl set 4%-"
on-action = '''brightnessctl -m | awk -F',' '{gsub(/%/, "", $4); p=$4+0; printf("{\"percentage\":%d,\"text\":\"%d%%\"}\n", p, p)}' '''

[[modules.custom]]
id = "vpn"
command = '''if /home/namik/.config/hypr/scripts/status-vpn-active.sh | grep -q true; then printf('{"text":"VPN"}\n'); else printf('{"text":""}\n'); fi'''
mode = "poll"
interval-ms = 2000
format = "{{ text }}"
icon-name = "md-vpn_lock-symbolic"
label-show = true
label-max-length = 4
button-bg-color = "transparent"
icon-bg-color = "auto"
label-color = "fg-default"
left-click = "nm-connection-editor"

[[modules.custom]]
id = "dnd"
command = '''if /home/namik/.config/hypr/scripts/status-dnd.sh | grep -q true; then printf('{"text":"DND"}\n'); else printf('{"text":""}\n'); fi'''
mode = "poll"
interval-ms = 1200
format = "{{ text }}"
icon-name = "md-do_not_disturb_alt-symbolic"
label-show = true
label-max-length = 4
button-bg-color = "transparent"
icon-bg-color = "auto"
label-color = "fg-default"
left-click = "/home/namik/.config/hypr/scripts/notif-dnd-toggle.sh"

[[modules.custom]]
id = "logs"
command = '''printf('{"text":"LOG"}\n')'''
mode = "static"
format = "{{ text }}"
icon-name = "md-terminal-symbolic"
label-show = true
label-max-length = 4
button-bg-color = "transparent"
icon-bg-color = "auto"
label-color = "fg-default"
left-click = "/home/namik/.config/hypr/scripts/logs-workspace.sh open"

[[modules.custom]]
id = "actions"
command = '''printf('{"text":"ACT"}\n')'''
mode = "static"
format = "{{ text }}"
icon-name = "md-flash_on-symbolic"
label-show = true
label-max-length = 4
button-bg-color = "transparent"
icon-bg-color = "auto"
label-color = "fg-default"
left-click = "/home/namik/.config/hypr/scripts/quick-actions.sh"

[modules.battery]
left-click = "dropdown:battery"
icon-bg-color = "auto"
label-color = "fg-default"
button-bg-color = "transparent"

[modules.dashboard]
left-click = "dropdown:dashboard"
dropdown-lock-command = "loginctl lock-session"
dropdown-logout-command = "loginctl terminate-session $XDG_SESSION_ID"
dropdown-reboot-command = "systemctl reboot"
dropdown-poweroff-command = "systemctl poweroff"

[osd]
enabled = false

[wallpaper]
engine-enabled = false
