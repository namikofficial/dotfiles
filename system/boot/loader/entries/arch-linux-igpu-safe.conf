# Managed by dotfiles system profile
# Replace PARTUUID before applying.
title   Arch Linux (iGPU safe)
linux   /vmlinuz-linux
initrd  /initramfs-linux.img
options root=PARTUUID=REPLACE_PARTUUID zswap.enabled=0 rw rootfstype=ext4 modprobe.blacklist=nouveau,nvidia,nvidia_drm,nvidia_modeset,nvidia_uvm
