# noxflow tmux config

# ── Performance & terminal ───────────────────────────────────────────────────
set -sg escape-time 0
set -g history-limit 100000
set -g focus-events on
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-kitty:RGB"
set -ga terminal-overrides ",xterm-kitty:Tc"
set -g set-clipboard on

# ── Session ergonomics ───────────────────────────────────────────────────────
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g detach-on-destroy off
set -g mouse on
set -g repeat-time 500
set -g display-panes-time 3000   # show pane numbers for 3s (helpful for new users)
set -g display-time 3000         # show status messages for 3s

# ── Prefix: Ctrl+A ──────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ── Splits (always open in current directory) ────────────────────────────────
unbind '"'
unbind %
bind - split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# ── Pane navigation (vim-style hjkl) ────────────────────────────────────────
setw -g mode-keys vi
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Pane borders: show running command + pane size ──────────────────────────
set -g pane-border-status top
set -g pane-border-format " #{pane_index} #{pane_current_command} [#{pane_width}×#{pane_height}]#{?pane_active, ◆,} "
set -g pane-border-lines heavy

# ── Quality-of-life bindings ─────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display-message " Config reloaded!"
bind C-l refresh-client
bind Space next-layout
bind x kill-pane
bind X kill-window
bind q confirm-before -p "Kill session '#S'? (y/n)" kill-session

# ── Window navigation (Alt+h/l = switch windows without prefix) ──────────────
bind -n M-h previous-window
bind -n M-l next-window
bind -r Tab next-window

# ── Popup: scratch terminal (Prefix + t) ────────────────────────────────────
bind t display-popup -E -w 80% -h 80% -d "#{pane_current_path}" "zsh"

# ── Popup: lazygit (Prefix + g) — install with: sudo pacman -S lazygit ──────
bind g display-popup -E -w 92% -h 92% -d "#{pane_current_path}" \
  "command -v lazygit >/dev/null && lazygit || { echo 'lazygit not found.'; echo 'Install it: sudo pacman -S lazygit'; read -r; }"

# ── Popup: keybinding cheatsheet (Prefix + ?) ───────────────────────────────
bind ? display-popup -E -w 60% -h 90% "~/.local/bin/tmux-help"

# ── Session manager (Prefix + s) — replaces choose-tree ─────────────────────
# Ctrl+D=kill  Ctrl+E=rename  Ctrl+A=new session  Enter=switch
bind s display-popup -E -w 60% -h 80% "~/.local/bin/tmux-sessions"

# ── Copy mode ────────────────────────────────────────────────────────────────
if-shell 'command -v wl-copy >/dev/null 2>&1' \
  "set -g @copy_command 'wl-copy'" \
  "if-shell 'command -v xclip >/dev/null 2>&1' \"set -g @copy_command 'xclip -in -selection clipboard'\" \"if-shell 'command -v pbcopy >/dev/null 2>&1' \\\"set -g @copy_command 'pbcopy'\\\" \\\"set -g @copy_command 'cat >/dev/null'\\\"\""

bind -n MouseDrag1Pane if -F "#{mouse_any_flag}" "send-keys -M" "copy-mode -M"
bind-key -T copy-mode-vi v   send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y   send-keys -X copy-pipe-and-cancel "#{@copy_command}"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "#{@copy_command}"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "#{@copy_command}"
bind-key -T copy-mode-vi DoubleClick1Pane send-keys -X select-word
bind-key -T copy-mode-vi TripleClick1Pane send-keys -X select-line
bind-key -T copy-mode y   send-keys -X copy-pipe-and-cancel "#{@copy_command}"
bind-key -T copy-mode Enter send-keys -X copy-pipe-and-cancel "#{@copy_command}"
bind-key -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "#{@copy_command}"

# ── Activity monitoring: highlight windows with new output ───────────────────
set -g monitor-activity on
set -g visual-activity off     # mark the window tab, no distracting flash

# ── Plugins ──────────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Session persistence: auto-saves every 15 min, restores on start
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Clipboard (y to copy in copy-mode)
set -g @plugin 'tmux-plugins/tmux-yank'

# FZF-powered session/window/pane switcher (Prefix + F)
set -g @plugin 'sainnhe/tmux-fzf'

# Open URLs & files from copy-mode with 'o' key
set -g @plugin 'tmux-plugins/tmux-open'

# Smart text picker: in copy-mode press F, then a letter to grab any text/URL
set -g @plugin 'fcsonline/tmux-thumbs'

# Visual URL picker from scrollback — Prefix + u
set -g @plugin 'wfxr/tmux-fzf-url'

# Right-click-style menu system (great for new users) — Prefix + \
set -g @plugin 'jaclu/tmux-menus'

# Desktop notification when a long command finishes in another pane/window
set -g @plugin 'rickstaa/tmux-notify'

# Better session management: Prefix + g(oto), C(reate), K(ill), R(ename)
set -g @plugin 'tmux-plugins/tmux-sessionist'

# Status bar extras: CPU and battery
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-cpu'

# Catppuccin Mocha — beautiful dark theme with a rich status bar
set -g @plugin 'catppuccin/tmux#v2.1.3'

# ── Plugin settings ──────────────────────────────────────────────────────────
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

set -g @fzf-url-fzf-options '-p 60%,30% --border-label=" Open with FZF "'
set -g @open-S 'https://www.google.com/search?q='

# tmux-thumbs: press F in copy-mode to activate smart picking
set -g @thumbs-key F

# tmux-fzf-url: Prefix + u to pick URLs from scrollback in a popup
set -g @fzf-url-bind 'u'
set -g @fzf-url-open 'xdg-open'

# tmux-menus: Prefix + \ for the context menu (beginner-friendly)
set -g @menus_trigger '\\'
set -g @menus_location_x 'C'
set -g @menus_location_y 'C'

# tmux-notify: notify when a command finishes (default: commands > 15s)
set -g @tnotify-sleep-duration '15'

# tmux-sessionist: Prefix + g = goto session, C = new, K = kill, R = rename
# (bindings are automatic)

# ── Catppuccin theme ─────────────────────────────────────────────────────────
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_window_default_text '#W'
set -g @catppuccin_window_current_text '#W#{?window_zoomed_flag,  ,}'
set -g @catppuccin_date_time_text ' %a %d %b  %H:%M'

# ── Status bar (assembled with Catppuccin modules) ───────────────────────────
set -g status-position bottom
set -g status-justify left
set -g status-left-length 80
set -g status-right-length 150
set -g status-interval 5

# Left: session name (with active prefix indicator built-in via catppuccin)
set -g status-left '#{E:@catppuccin_status_session}'

# Right: CPU → battery → date/time
set -g status-right '#{cpu_percentage} | #{battery_icon} #{battery_percentage} | %a %d %b %H:%M'

# ── Initialize TPM (keep this line at the very bottom) ───────────────────────
if-shell '[ -d ~/.tmux/plugins/tpm ]' 'run-shell ~/.tmux/plugins/tpm/tpm'
