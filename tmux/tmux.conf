# noxflow tmux config

# Performance and terminal behavior
set -sg escape-time 0
set -g history-limit 100000
set -g focus-events on
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-kitty:RGB"
set -ga terminal-overrides ",xterm-kitty:Tc"
set -g set-clipboard on

# Indexing and session ergonomics
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g detach-on-destroy off
set -g mouse on
set -g repeat-time 500

# Prefix: Ctrl+a (screen-style)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Split panes in current directory
unbind '"'
unbind %
bind - split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Vim-like navigation and resizing
setw -g mode-keys vi
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Quick quality-of-life
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"
bind C-l refresh-client
bind Space next-layout
bind x kill-pane
bind X kill-window
bind q confirm-before -p "Kill session #S? (y/n)" kill-session
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "wl-copy"

# Status bar
set -g status-position bottom
set -g status-justify left
set -g status-left-length 80
set -g status-right-length 120
set -g status-interval 5
set -g status-left "#[fg=green,bold]#S #[fg=colour8]| #[fg=cyan]#(whoami)@#H"
set -g status-right "#[fg=yellow]#(cut -d' ' -f1 /proc/loadavg) #[fg=colour8]| #[fg=magenta]%Y-%m-%d #[fg=blue]%H:%M"
setw -g window-status-current-format "#[bold] #I:#W "

# TPM plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Initialize TPM (keep this line at the bottom)
if-shell '[ -d ~/.tmux/plugins/tpm ]' 'run-shell ~/.tmux/plugins/tpm/tpm'
